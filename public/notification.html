<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard Alert</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
      pointer-events: auto;
    }

    .notif {
      width: 400px;
      height: 124px;
      background: rgba(18, 18, 30, 0.96);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(56, 210, 248, 0.28);
      border-radius: 16px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5), 0 20px 60px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      transform: translateX(440px);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
      pointer-events: auto;
    }

    .notif.visible {
      transform: translateX(0);
      opacity: 1;
    }

    .top-bar {
      height: 2px;
      background: linear-gradient(90deg, rgba(56, 210, 248, .9) 0%, rgba(56, 210, 248, .3) 60%, transparent 100%);
    }

    .body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .row1 {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      /* Drag handle limited to top row only */
      -webkit-app-region: drag;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .icon-wrap {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(56, 210, 248, .12);
      border: 1px solid rgba(56, 210, 248, .18);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ticker {
      display: inline-block;
      font-size: 11px;
      font-weight: 800;
      font-family: 'Consolas', 'Cascadia Code', monospace;
      color: #38d2f8;
      background: rgba(56, 210, 248, .12);
      border: 1px solid rgba(56, 210, 248, .2);
      border-radius: 6px;
      padding: 1px 8px;
    }

    .message {
      font-size: 12.5px;
      font-weight: 500;
      color: rgba(245, 248, 255, .95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
      margin-top: 2px;
    }

    .duration-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      color: rgba(130, 255, 180, .9);
      background: rgba(56, 230, 130, .08);
      border: 1px solid rgba(56, 230, 130, .14);
      border-radius: 20px;
      padding: 2px 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
      /* EXPLICIT NO-DRAG FOR BUTTONS */
      -webkit-app-region: no-drag;
      pointer-events: auto;
    }

    button {
      flex: 1;
      height: 34px;
      border: none;
      border-radius: 10px;
      font-size: 11.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      pointer-events: auto;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-view {
      background: rgba(56, 210, 248, .16);
      border: 1px solid rgba(56, 210, 248, .25);
      color: #38d2f8;
    }

    .btn-view:hover {
      background: rgba(56, 210, 248, .26);
      border-color: rgba(56, 210, 248, .4);
    }

    .btn-view:active {
      transform: scale(0.96);
      background: rgba(56, 210, 248, .36);
    }

    .btn-dismiss {
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      color: rgba(200, 210, 230, .6);
    }

    .btn-dismiss:hover {
      background: rgba(255, 255, 255, .1);
      color: rgba(200, 210, 230, .9);
    }

    .btn-dismiss:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, .15);
    }
  </style>
</head>

<body>
  <div class="notif" id="notif">
    <div class="top-bar"></div>
    <div class="body">
      <div class="row1">
        <div class="left">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#38d2f8" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </div>
          <div class="title-wrap">
            <div class="label" style="font-size: 8.5px; opacity: 0.6;">FocusGuard Alert</div>
            <div><span class="ticker" id="ticker">ALERT</span></div>
            <div class="message" id="message">Loading...</div>
          </div>
        </div>
        <div class="duration-badge" id="duration">30m unlock</div>
      </div>
      <div class="actions">
        <button class="btn-view" id="btn-view">⚡ View Dashboard</button>
        <button class="btn-dismiss" id="btn-dismiss">Dismiss</button>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    let loopTimer = null;
    let currentSound = 'bell';
    let customAudio = null;

    // ── Sound Presets ─────────────────────────────────────────────────────────────
    const SOUNDS = {
      bell: (ctx) => {
        [[880, .35, 1.8], [1320, .2, 1.2], [1760, .12, .8], [2200, .06, .5]].forEach(([f, g, d]) => {
          const o = ctx.createOscillator(), gn = ctx.createGain()
          o.connect(gn); gn.connect(ctx.destination); o.type = 'sine'; o.frequency.value = f
          const t = ctx.currentTime; gn.gain.setValueAtTime(0, t); gn.gain.linearRampToValueAtTime(g, t + 0.03); gn.gain.exponentialRampToValueAtTime(0.001, t + d)
          o.start(t); o.stop(t + d + 0.05)
        })
      },
      trumpet: (ctx) => {
        const o = ctx.createOscillator(), gn = ctx.createGain(), filt = ctx.createBiquadFilter()
        o.connect(filt); filt.connect(gn); gn.connect(ctx.destination); o.type = 'sawtooth'; filt.type = 'lowpass'
        const t = ctx.currentTime; o.frequency.setValueAtTime(587, t); o.frequency.linearRampToValueAtTime(880, t + 0.08)
        filt.frequency.setValueAtTime(800, t); filt.frequency.exponentialRampToValueAtTime(3200, t + 0.12)
        gn.gain.setValueAtTime(0, t); gn.gain.linearRampToValueAtTime(0.3, t + 0.06); gn.gain.setValueAtTime(0.3, t + 0.3); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.9)
        o.start(t); o.stop(t + 1)
      },
      chime: (ctx) => {
        [1047, 1319, 1568, 2093].forEach((f, i) => {
          const o = ctx.createOscillator(), gn = ctx.createGain(); o.connect(gn); gn.connect(ctx.destination); o.type = 'sine'; o.frequency.value = f
          const t = ctx.currentTime + i * 0.13; gn.gain.setValueAtTime(0, t); gn.gain.linearRampToValueAtTime(0.28, t + 0.02); gn.gain.exponentialRampToValueAtTime(0.001, t + 1.2)
          o.start(t); o.stop(t + 1.3)
        })
      },
      alarm: (ctx) => {
        [[0, 0.32], [0.22, 0.1]].forEach(([delay, off]) => {
          const o = ctx.createOscillator(), gn = ctx.createGain(); o.connect(gn); gn.connect(ctx.destination); o.type = 'square'; o.frequency.value = 1047
          const t = ctx.currentTime + delay; gn.gain.setValueAtTime(0.25, t); gn.gain.setValueAtTime(0, t + 0.18 - off); o.start(t); o.stop(t + 0.2)
        })
      },
      horn: (ctx) => {
        const o = ctx.createOscillator(), gn = ctx.createGain(), filt = ctx.createBiquadFilter()
        o.connect(filt); filt.connect(gn); gn.connect(ctx.destination); o.type = 'sawtooth'; filt.type = 'lowpass'; filt.frequency.value = 600; o.frequency.value = 220
        const t = ctx.currentTime; gn.gain.setValueAtTime(0, t); gn.gain.linearRampToValueAtTime(0.4, t + 0.1); gn.gain.setValueAtTime(0.4, t + 0.5); gn.gain.exponentialRampToValueAtTime(0.001, t + 1.2)
        o.start(t); o.stop(t + 1.3)
      },
      ping: (ctx) => {
        const o = ctx.createOscillator(), gn = ctx.createGain(); o.connect(gn); gn.connect(ctx.destination); o.type = 'sine'; o.frequency.value = 1760
        const t = ctx.currentTime; gn.gain.setValueAtTime(0.5, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.8); o.start(t); o.stop(t + 0.85)
      },
    }

    function playSound(name) {
      try {
        const ctx = new AudioContext()
        const fn = SOUNDS[name] || SOUNDS.bell
        fn(ctx)
      } catch (e) { console.error('Audio failed:', e) }
    }

    function startLoop(name) {
      stopLoop();
      currentSound = name;
      if (name && name.startsWith('file://')) {
        customAudio = new Audio(name);
        customAudio.loop = true;
        customAudio.play().catch(e => console.error('Custom audio error:', e));
      } else {
        playSound(name);
        loopTimer = setInterval(() => playSound(currentSound), 1000);
      }
    }

    function stopLoop() {
      if (customAudio) {
        customAudio.pause();
        customAudio.currentTime = 0;
      }
      if (loopTimer) {
        clearInterval(loopTimer);
        loopTimer = null;
      }
    }

    // ── Receive data + sound type ─────────────────────
    ipcRenderer.on('notif:data', (_, { ticker, message, duration, sound }) => {
      document.getElementById('ticker').textContent = ticker
      document.getElementById('message').textContent = message
      document.getElementById('duration').textContent = `${duration}m unlock`

      requestAnimationFrame(() => {
        document.getElementById('notif').classList.add('visible')
        startLoop(sound || 'bell');
      })
    })

    // ── Buttons with explicit event handling ──────────
    const btnView = document.getElementById('btn-view');
    const btnDismiss = document.getElementById('btn-dismiss');

    btnView.onclick = () => {
      stopLoop();
      ipcRenderer.send('notif:view');
    };

    btnDismiss.onclick = () => {
      stopLoop();
      const n = document.getElementById('notif')
      n.style.transition = 'transform .2s cubic-bezier(.4,0,1,1), opacity .15s'
      n.style.transform = 'translateX(440px)'; n.style.opacity = '0'
      setTimeout(() => ipcRenderer.send('notif:dismiss'), 200);
    };

    // Prevent any clicks from bubbling up to draggable areas
    btnView.onmousedown = btnDismiss.onmousedown = (e) => e.stopPropagation();
  </script>
</body>

</html>
