<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusGuard — Locked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #080810;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: drift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 56px 72px;
      background: rgba(15, 15, 30, 0.85);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 80px rgba(99, 102, 241, 0.08), 0 32px 64px rgba(0,0,0,0.6);
      max-width: 520px;
      width: 90vw;
    }

    .lock-icon {
      font-size: 72px;
      margin-bottom: 24px;
      display: block;
      animation: bounce 3s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1rem;
      color: #64748b;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    .info-box {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .info-box p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.7;
    }

    .info-box strong {
      color: #a78bfa;
    }

    .clock {
      font-size: 0.8rem;
      color: #334155;
      margin-top: 24px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #time-display {
      color: #475569;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <span class="lock-icon">🔒</span>
    <h1>Session Locked</h1>
    <div class="divider"></div>
    <p class="subtitle">Your discipline module is active.</p>

    <div class="info-box">
      <p>
        Trading is <strong>blocked</strong> until a cTrader price alert triggers.<br><br>
        Set your alerts in cTrader, then wait for the market to come to you.
      </p>
    </div>

    <div class="clock">Current time: <span id="time-display">--:--:--</span></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date()
      document.getElementById('time-display').textContent = now.toLocaleTimeString()
    }
    updateClock()
    setInterval(updateClock, 1000)
  </script>
</body>
</html>
