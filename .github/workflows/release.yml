name: Build & Release FocusGuard

on:
  push:
    tags:
      - 'v*'   # Trigger on any tag like v2.0.1, v2.1.0 etc.

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npx next build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Package Electron app & publish to GitHub
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ''

      - name: Manually Upload Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exeFile = Get-ChildItem -Path dist-electron -Filter "FocusGuard Setup*.exe" | Select-Object -First 1
          gh release upload ${{ github.ref_name }} "$($exeFile.FullName)" --clobber
